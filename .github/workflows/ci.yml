name: ci

on:
  push:
    branches: ["**"]
  pull_request:

# Least-privilege default token.
permissions:
  contents: read

jobs:
  gates:
    name: hard gates (contracts · no-dump · no-Ingress)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install jsonschema
      - name: no-dump gate
        run: bash scripts/check_no_dump.sh tree
      - name: no-Ingress gate
        run: bash scripts/check_no_ingress.sh tree
      - name: contract gate (schema + sample + checksums)
        run: python scripts/contract_gate.py

  migrations:
    name: migrations apply (V1 frozen + V2) on PG 16
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env: { POSTGRES_PASSWORD: postgres, POSTGRES_USER: postgres }
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres" --health-interval 5s
          --health-timeout 5s --health-retries 10
    env:
      PGHOST: 127.0.0.1
      PG_SUPERUSER: postgres
      PGUSER: postgres
      PGPASSWORD: postgres
    steps:
      - uses: actions/checkout@v4
      - name: byte-identity V1 == frozen contract
        run: diff -q contracts/claim-schema.sql services/engine/src/main/resources/db/migration/V1__initial_contract.sql
      - name: create roles + db, apply V1+V2
        run: |
          psql -h 127.0.0.1 -U postgres -c "CREATE ROLE migrate LOGIN PASSWORD 'migrate_pw';"
          psql -h 127.0.0.1 -U postgres -c "CREATE DATABASE contract_gate OWNER migrate;"
          psql -h 127.0.0.1 -U postgres -d contract_gate -c "GRANT ALL ON SCHEMA public TO migrate;"
          for f in services/engine/src/main/resources/db/migration/V*.sql; do
            echo "applying $f"; PGPASSWORD=migrate_pw psql -h 127.0.0.1 -U migrate -d contract_gate -v ON_ERROR_STOP=1 -q -f "$f"
          done
          PGPASSWORD=migrate_pw psql -h 127.0.0.1 -U migrate -d contract_gate -c "\dt"

  engine:
    name: engine (build + tests, Testcontainers)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: "21", cache: maven }
      - name: build + test
        working-directory: services/engine
        run: mvn -B verify

  pipeline:
    name: pipeline (pytest fast suite + adapter rules)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: install + test
        working-directory: pipeline
        run: |
          python -m pip install -e '.[dev]'
          pytest -q -m 'not slow'

  sdk:
    name: sdk (generate + drift gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: "21", cache: maven }
      - uses: actions/setup-node@v4
        with: { node-version: "22" }
      - name: generate SDK from engine OpenAPI and fail on drift
        run: bash sdk/typescript/generate.sh --check

  explorer:
    name: explorer (typecheck · unit · a11y · e2e-interaction)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22" }
      - name: install + build + test
        working-directory: explorer
        env:
          # CI has no pre-provisioned browser dir; let Playwright use its default
          # cache (~/.cache/ms-playwright) that the install step below populates.
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "0"
        run: |
          corepack enable
          pnpm install --frozen-lockfile
          pnpm typecheck
          pnpm build
          # The dev container ships Chromium at /opt/pw-browsers; CI runners do not,
          # so install the matching browser (+OS deps) before the E2E.
          pnpm exec playwright install --with-deps chromium
          pnpm test
      - name: no hard-coded honesty-page statistics (§16)
        run: bash scripts/check_no_hardcoded_stats.sh

  kind-smoke:
    name: kind smoke (main only)
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: helm/kind-action@v1
      - name: kustomize build validates
        run: |
          curl -sSLo /usr/local/bin/kustomize.tar.gz https://github.com/kubernetes-sigs/kustomize/releases/latest/download/kustomize.tar.gz || true
          kubectl kustomize deploy/overlays/local > /tmp/rendered.yaml
          ! grep -Eq '^\s*kind:\s*Ingress' /tmp/rendered.yaml   # gate: no Ingress in rendered output
      - name: deploy + import 1k synthetic fixture + signature query
        run: bash scripts/kind_smoke.sh
