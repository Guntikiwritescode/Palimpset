# Explorer nginx config (ARCHITECTURE §3.7, §5.6). Serves the static React/Vite
# build with SPA-style fallback to index.html; does NOT proxy the API (the browser
# talks to the engine directly at the port-forwarded origin; CORS is pinned
# engine-side). Content mirrors deploy/base/palimpsest/explorer-configmap.yaml —
# the k8s ConfigMap mounts the same default.conf over this at deploy time; this
# baked-in copy makes the image serve /healthz standalone (kind smoke, docker run).
server {
  listen       80;
  server_name  _;
  root   /usr/share/nginx/html;
  index  index.html;

  # Lightweight liveness/readiness target for the probes.
  location = /healthz {
    add_header Content-Type text/plain;
    return 200 'ok';
  }

  # SPA routing: unknown paths resolve to the app shell (URL-as-state, §3.7).
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Static assets: long cache; index.html stays revalidated.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }
}
