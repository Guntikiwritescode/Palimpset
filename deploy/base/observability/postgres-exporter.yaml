# postgres_exporter — feeds the "DB size + table rowcounts" dashboard panels
# (ARCHITECTURE §5.6). Connects to the claim store with the read-only role
# (analytics_ro, §7); the password comes from observability-secrets, assembled
# into DATA_SOURCE_NAME at runtime so it is never written to a ConfigMap.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-exporter
  namespace: observability
  labels:
    app.kubernetes.io/part-of: palimpsest
    app.kubernetes.io/component: postgres-exporter
    app.kubernetes.io/name: postgres-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: palimpsest
        app.kubernetes.io/component: postgres-exporter
        app.kubernetes.io/name: postgres-exporter
    spec:
      containers:
        - name: postgres-exporter
          # Pinned: prometheus-community postgres_exporter.
          image: quay.io/prometheuscommunity/postgres-exporter:v0.15.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: metrics
              containerPort: 9187
          env:
            - name: ANALYTICS_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: observability-secrets
                  key: analytics-db-password
            - name: DATA_SOURCE_URI
              value: palimpsest-postgres.palimpsest.svc.cluster.local:5432/palimpsest?sslmode=disable
            - name: DATA_SOURCE_USER
              value: analytics_ro
            - name: DATA_SOURCE_PASS
              valueFrom:
                secretKeyRef:
                  name: observability-secrets
                  key: analytics-db-password
            # Emit per-table row estimates and DB size.
            - name: PG_EXPORTER_AUTO_DISCOVER_DATABASES
              value: "false"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-exporter
  namespace: observability
  labels:
    app.kubernetes.io/part-of: palimpsest
    app.kubernetes.io/component: postgres-exporter
    app.kubernetes.io/name: postgres-exporter
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: postgres-exporter
  ports:
    - name: metrics
      port: 9187
      targetPort: metrics
