# =============================================================================
# SECRET TEMPLATE — DO NOT APPLY AS-IS, DO NOT COMMIT REAL VALUES
# =============================================================================
# ARCHITECTURE §7 / .claude/rules/deploy.md: secrets are Kubernetes Secret
# objects, REFERENCED (by name) from workloads, never embedded in images or
# manifests, and never committed with real values.
#
# This file is a *template* only. It is deliberately NOT listed in any
# kustomization.yaml, so `kubectl apply -k` will never push these placeholders
# into a cluster. To use it:
#
#   1. cp deploy/base/secret.example.yaml /tmp/palimpsest-secrets.yaml
#   2. replace every CHANGE_ME_dev_only with a real value
#   3. kubectl apply -f /tmp/palimpsest-secrets.yaml     # then delete the file
#
# For the local kind flow, scripts/kind_smoke.sh and scripts/demo.sh create
# these Secrets imperatively with throwaway dev tokens instead (see the runbook).
#
# Every value below is an OBVIOUS placeholder. If any of these strings reaches a
# cluster, the engine's DB login and Flyway migration will both fail loudly —
# by design. Real secrets never look like this.
# -----------------------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: palimpsest-secrets
  namespace: palimpsest
  labels:
    app.kubernetes.io/part-of: palimpsest
type: Opaque
stringData:
  # Postgres superuser — used only by the container's init to create roles.
  postgres-superuser-password: CHANGE_ME_dev_only_superuser
  # Least-privilege role passwords (ARCHITECTURE §7): engine_rw / migrate / analytics_ro.
  engine-db-password: CHANGE_ME_dev_only_engine_rw
  migrate-db-password: CHANGE_ME_dev_only_migrate
  analytics-db-password: CHANGE_ME_dev_only_analytics_ro
  # Bearer tokens (ADR-005): distinct tokens for the human scholar and the
  # pipeline agent so the audit trail can tell human from machine writes.
  scholar-token: CHANGE_ME_dev_only_scholar_bearer
  pipeline-token: CHANGE_ME_dev_only_pipeline_bearer
---
apiVersion: v1
kind: Secret
metadata:
  name: observability-secrets
  namespace: observability
  labels:
    app.kubernetes.io/part-of: palimpsest
type: Opaque
stringData:
  # Grafana admin login (viewing is anonymous read-only in the local overlay,
  # but the admin account still needs a password).
  grafana-admin-password: CHANGE_ME_dev_only_grafana_admin
  # postgres_exporter connects to the claim store with the read-only role.
  analytics-db-password: CHANGE_ME_dev_only_analytics_ro
