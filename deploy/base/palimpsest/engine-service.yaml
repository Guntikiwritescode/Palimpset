# Engine API service — ClusterIP only. Reached from a laptop via
# `kubectl port-forward svc/palimpsest-engine 8080:8080`. No Ingress, no
# LoadBalancer: the license gate is enforced at the network layer (§3.8).
apiVersion: v1
kind: Service
metadata:
  name: palimpsest-engine
  namespace: palimpsest
  labels:
    app.kubernetes.io/part-of: palimpsest
    app.kubernetes.io/component: engine
    app.kubernetes.io/name: engine
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: engine
    app.kubernetes.io/component: engine
  ports:
    - name: http
      port: 8080
      targetPort: http
