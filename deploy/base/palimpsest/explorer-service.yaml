# Explorer service — ClusterIP only. Reached via
# `kubectl port-forward svc/palimpsest-explorer 8081:80`. No Ingress / no
# LoadBalancer (§3.8).
apiVersion: v1
kind: Service
metadata:
  name: palimpsest-explorer
  namespace: palimpsest
  labels:
    app.kubernetes.io/part-of: palimpsest
    app.kubernetes.io/component: explorer
    app.kubernetes.io/name: explorer
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: explorer
    app.kubernetes.io/component: explorer
  ports:
    - name: http
      port: 80
      targetPort: http
